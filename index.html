<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GG Thrift Hub</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: black;
  color: gold;
  padding: 15px;
  text-align: center;
}

.filters {
  padding: 10px;
  background: white;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

select {
  padding: 5px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
  gap: 10px;
  padding: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
}

button {
  background: black;
  color: gold;
  border: none;
  padding: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>
  <h1>GG Thrift Hub</h1>
  <p>Call or WhatsApp: 652-5085</p>
</header>

<div class="filters">
  <select id="size">
    <option value="">Size</option>
    <option>S</option>
    <option>M</option>
    <option>L</option>
  </select>

  <select id="style">
    <option value="">Style</option>
    <option>Streetwear</option>
    <option>Casual</option>
  </select>

  <select id="sex">
    <option value="">Sex</option>
    <option>Men</option>
    <option>Women</option>
  </select>

  <select id="age">
    <option value="">Age</option>
    <option>Kids</option>
    <option>Adult</option>
  </select>

  <button onclick="filter()">Filter</button>
</div>

<div class="products" id="products"></div>

<script>
const items = [
  {
    name: "Vintage T-Shirt",
    size: "M",
    style: "Streetwear",
    sex: "Men",
    age: "Adult",
    price: "$10"
  },
  {
    name: "Casual Dress",
    size: "S",
    style: "Casual",
    sex: "Women",
    age: "Adult",
    price: "$12"
  }
];

function display(data){
  const container = document.getElementById("products");
  container.innerHTML = "";

  data.forEach(item => {
    container.innerHTML += `
      <div class="card">
        <h3>${item.name}</h3>
        <p>Size: ${item.size}</p>
        <p>Style: ${item.style}</p>
        <p>${item.price}</p>
        <button onclick="order('${item.name}')">Order</button>
      </div>
    `;
  });
}

function filter(){
  let size = document.getElementById("size").value;
  let style = document.getElementById("style").value;
  let sex = document.getElementById("sex").value;
  let age = document.getElementById("age").value;

  let filtered = items.filter(item =>
    (!size || item.size === size) &&
    (!style || item.style === style) &&
    (!sex || item.sex === sex) &&
    (!age || item.age === age)
  );

  display(filtered);
}

function order(name){
  let phone = "6525085";
  let message = `Hi, I'm interested in ${name}`;
  window.open(`https://wa.me/501${phone}?text=${encodeURIComponent(message)}`);
}

display(items);
</script>

</body>
</html>
